server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ECS health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"domain-checker-frontend"}';
        add_header Content-Type application/json;
    }

    # Proxy /api/* requests to the backend container
    # In Docker Compose, "backend" resolves via the app-network DNS
    # In ECS, this is handled by the ALB — nginx won't have this block in production
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}